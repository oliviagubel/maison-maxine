<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Maxine™</title>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>

body, a, button{cursor:url("wine-cursor.png") 44 37, auto}
a:hover, button:hover{cursor:url("wine-cursor.png") 44 37, pointer}
@import url('https://fonts.cdnfonts.com/css/burgues-script');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(255,255,255,.35);pointer-events:none;z-index:0;
}

body{
  background:url('idx-11cfe590.jpg') repeat;
  background-size:380px auto;
  font-family:'Cormorant Garamond',Georgia,serif;
}

/* pin */
.pin{
  position:absolute;width:13px;height:13px;border-radius:50%;
  top:-8px;left:50%;transform:translateX(-50%);
  box-shadow:1px 1px 3px rgba(0,0,0,.45);z-index:30;
}
.pin::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:3px;height:6px;background:rgba(0,0,0,.25);border-radius:0 0 2px 2px}
.pr{background:radial-gradient(circle at 38% 35%,#e07060,#a02820)}
.pp{background:radial-gradient(circle at 38% 35%,#f0a0c0,#c05080)}
.pt{background:radial-gradient(circle at 38% 35%,#d4b88a,#a08050)}
.pg{background:radial-gradient(circle at 38% 35%,#a0d080,#508030)}
.pw{background:radial-gradient(circle at 38% 35%,#f8f0e0,#c8b898)}

/* photo — stitched border style */
.pol{
  position:absolute;
  background:#fef8fb;
  padding:8px;
  border:2.5px dashed #d4a0b8;
  border-radius:16px;
  box-shadow:2px 3px 10px rgba(0,0,0,.12);
  overflow:hidden;
}
.pol:hover{box-shadow:4px 6px 18px rgba(0,0,0,.22);z-index:500!important}
.pol img{display:block;width:100%;object-fit:cover;border-radius:10px}
.pol-cap{display:none}
.pol-lbl{display:none}

/* sticky */
.sticky{
  position:absolute;background:#fef8e4;
  border:1px solid rgba(200,180,100,.2);
  padding:16px 18px 18px;
  box-shadow:3px 5px 12px rgba(0,0,0,.18);
  font-family:'IM Fell English',serif;
}
.sticky::before{
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:46px;height:14px;background:rgba(210,190,150,.4);
  border:1px solid rgba(180,160,120,.2)
}
.s-title{
  display:block;text-align:center;font-size:12.5px;font-weight:bold;
  color:#4a3010;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px
}
.s-body{font-size:12.5px;font-style:italic;color:#5a4020;line-height:1.85}
.s-body a{color:#8a3a5f;text-decoration:underline}
.s-body a:hover{color:#b75d83}

/* notecard */
.note{
  position:absolute;background:#faf6f0;border:1px solid #d8ccc0;
  padding:12px 14px;box-shadow:2px 3px 9px rgba(0,0,0,.15);
  font-family:'Cormorant Garamond',serif;
}

/* sticker */
.sk{position:absolute;background:transparent}
.sk img{display:block}

/* tape */
.tape{
  position:absolute;background:rgba(215,195,165,.38);
  border:1px solid rgba(190,170,140,.2);pointer-events:none;z-index:25
}

/* logo pill */
.lpill{
  background:#fff;border:2.5px solid #b75d83;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 4px rgba(183,93,131,.1);position:relative;
}
.lpill::before{
  content:'◆';position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#b75d83;background:#fff;padding:0 4px
}
.ltext{
  font-family:'Petit Formal Script',cursive;color:#8a1a4a;
  line-height:1.1;text-align:center
}
.ltm{font-family:'IM Fell English',serif;font-size:9px;vertical-align:super;color:#b75d83}

/* enter */
#enter{
  position:absolute;text-decoration:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:bob 2.7s ease-in-out infinite;
  transition:transform .3s ease;
}
@keyframes bob{
  0%,100%{transform:rotate(-4deg) translateY(0)}
  50%{transform:rotate(-4deg) translateY(-9px)}
}
#enter:hover{animation-play-state:paused;transform:rotate(-4deg) scale(1.12)}
#etxt{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:14px;color:#5a1e3a;letter-spacing:.18em;
  text-shadow:1px 1px 0 rgba(255,255,255,.9)
}

/* MOUSE SPARKLE TRAIL */
.mouse-sparkle{position:fixed;pointer-events:none;z-index:99999;text-shadow:0 0 6px #fff,0 0 14px #fff,0 0 30px currentColor,0 0 55px currentColor,0 0 80px currentColor;animation:mouse-sparkle-fade 2.4s ease-out forwards}
@keyframes mouse-sparkle-fade{0%{opacity:.85;transform:scale(1) rotate(0deg) translateY(0)}25%{opacity:.7;transform:scale(1.15) rotate(25deg) translateY(-5px)}60%{opacity:.3;transform:scale(.9) rotate(50deg) translateY(10px)}100%{opacity:0;transform:scale(.5) rotate(70deg) translateY(30px)}}

/* ═══ PR FIRM UPGRADES ═══ */
.brand-header{
  position:absolute;top:-35px;left:50%;transform:translateX(-50%);
  z-index:30;text-align:center;white-space:nowrap;
}
.brand-name{
  font-family:"Burgues Script",cursive;font-size:42px;color:#8a1a4a;
  text-shadow:0 0 20px rgba(247,205,235,.6),0 0 40px rgba(247,205,235,.4);
  letter-spacing:.04em;line-height:1;
}
.brand-tagline{
  font-family:"IM Fell English",serif;font-style:italic;
  font-size:11px;color:#b75d83;letter-spacing:.14em;
  margin-top:2px;opacity:.85;
}
.charity-ribbon{
  position:absolute;top:-8px;right:-60px;z-index:30;
  background:linear-gradient(135deg,#fef0f8,#f7cdeb);
  border:1.5px solid #d4a0b8;border-radius:20px;
  padding:6px 14px;text-align:center;
  box-shadow:2px 3px 8px rgba(0,0,0,.1);
  transform:rotate(4deg);
}
.charity-ribbon span{
  font-family:"IM Fell English",serif;font-size:8px;
  color:#8a3a5f;letter-spacing:.05em;display:block;line-height:1.4;
}
.charity-ribbon .paw{font-size:11px;}
.xoxo-note{
  position:absolute;z-index:22;
  font-family:"Burgues Script",cursive;color:#c76090;
  opacity:.7;transform:rotate(-5deg);
  text-shadow:0 0 15px rgba(247,205,235,.5);
}
/* ═══ CURTAIN OVERLAY ═══ */
.curtain{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:9998;
  pointer-events:none;
  perspective:1000px;
}
.curtain-left,.curtain-right{
  position:absolute;
  top:0;bottom:0;
  width:65%;
  background-image:url('curtain.png');
  background-size:154% 130%;
  background-repeat:no-repeat;
  transition:transform 1.6s cubic-bezier(.77,0,.18,1);
  will-change:transform;
}
.curtain-left{
  left:0;
  background-position:0% 30%;
  transform-origin:left center;
}
.curtain-right{
  right:0;
  background-position:100% 30%;
  transform-origin:right center;
}
.curtain.open .curtain-left{
  transform:translateX(-105%) rotateY(-12deg);
}
.curtain.open .curtain-right{
  transform:translateX(105%) rotateY(12deg);
}
.curtain.gone{display:none}

.collage-item{transition:transform .4s ease, filter .4s ease;}
.collage-item:hover{transform:scale(1.05) rotate(0deg) !important;filter:brightness(1.05);z-index:30 !important;}
</style>
</head>
